name: Weekly Digest

on:
  schedule:
    - cron: "30 14 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to 1 to skip publish + commit"
        required: false
        default: "0"

# cancel-in-progress: true — symmetric with daily.yml. The weekly sentinel
# `weekly/{weekId}.published` is the atomic de-dup; see the rationale on
# daily.yml for the cancel-timing edge cases. A manual workflow_dispatch
# during an in-flight scheduled run cancels the older run instead of racing
# it on commit + push.
concurrency:
  group: weekly-digest
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODE: weekly
      DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
      # Minimum archive days required before the rollup will publish. If
      # fewer days exist on disk (e.g. first Monday of deployment after only
      # 3 daily runs), the weekly skips publish, logs the decision, and
      # exits 0. Operators can override per-run via workflow_dispatch env.
      MIN_DAYS_FOR_WEEKLY: "7"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      # Un-06 remote-idempotency pre-flight (weekly flavor). Mirrors the
      # daily check against `weekly/{weekId}.published`. The weekId is
      # anchored on *yesterday* so a Monday 14:30 UTC cron rolls up the
      # preceding Sunday-inclusive week — matches `runWeeklyDigest`.
      - name: Pre-flight remote sentinel check
        id: preflight
        run: |
          set -euo pipefail
          WEEK_ID="$(date -u -d 'yesterday' +%G-W%V)"
          SENTINEL="weekly/${WEEK_ID}.published"
          if git ls-tree -r --name-only "origin/${GITHUB_REF_NAME}" -- "$SENTINEL" 2>/dev/null | grep -Fxq "$SENTINEL"; then
            echo "::warning::Un-06 remote-idempotency (weekly): ${SENTINEL} already present on origin — short-circuiting"
            echo "SKIP_RUN=1" >> "$GITHUB_ENV"
            echo "SKIP_RUN_REASON=remote sentinel ${SENTINEL} exists on origin/${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "no remote sentinel for ${WEEK_ID} — proceeding"
          fi
      # Publish secret scoped to this step only (defence-in-depth; see
      # daily.yml for rationale). The weekly runner never calls Claude, so
      # ANTHROPIC_API_KEY stays absent entirely.
      - name: Run weekly digest
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: pnpm start
      - name: Commit weekly digest
        id: commit
        if: ${{ env.DRY_RUN != '1' }}
        run: |
          set -euo pipefail
          git config user.name "ai-builder-pulse-bot"
          git config user.email "ai-builder-pulse-bot@users.noreply.github.com"
          git add weekly/ || true
          if git diff --cached --quiet; then
            echo "::notice::no weekly digest changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Anchor the week id on *yesterday* to match runWeeklyDigest, which
          # rolls up the preceding Sunday-inclusive week. `date -u +%G-W%V`
          # on a Monday run would report the NEW week (e.g. W17) while the
          # file on disk is `weekly/2026-W16.md` — the commit message must
          # match the artifact.
          WEEK_ID="$(date -u -d 'yesterday' +%G-W%V)"
          git commit -m "archive: weekly digest $WEEK_ID"
          echo "committed=true" >> "$GITHUB_OUTPUT"
      - name: gitleaks secret scan
        if: ${{ steps.commit.outputs.committed == 'true' }}
        # Pinned to v2 commit SHA (immutable; floating tags can be moved).
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push weekly digest
        if: ${{ steps.commit.outputs.committed == 'true' }}
        run: |
          set -euo pipefail
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "::error::Weekly DIVERGENCE — Buttondown publish succeeded but git push failed. The weekly sentinel (weekly/{weekId}.published) is stranded on this runner; a manual re-dispatch of this workflow would re-publish. Operator must investigate before re-dispatch (retry push from local, or pause the workflow)."
            exit 1
          fi
