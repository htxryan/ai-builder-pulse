name: Weekly Digest

on:
  schedule:
    - cron: "30 14 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to 1 to skip publish + commit"
        required: false
        default: "0"

concurrency:
  group: weekly-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODE: weekly
      DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
      # No ANTHROPIC_API_KEY: the weekly runner never calls Claude — it
      # reads existing items.json files and re-ranks by stored relevance.
      # Keeping the surface narrow reduces supply-chain blast radius.
      BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - name: Run weekly digest
        run: pnpm start
      - name: Commit weekly digest
        id: commit
        if: ${{ env.DRY_RUN != '1' }}
        run: |
          set -euo pipefail
          git config user.name "ai-builder-pulse-bot"
          git config user.email "ai-builder-pulse-bot@users.noreply.github.com"
          git add weekly/ || true
          if git diff --cached --quiet; then
            echo "::notice::no weekly digest changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Anchor the week id on *yesterday* to match runWeeklyDigest, which
          # rolls up the preceding Sunday-inclusive week. `date -u +%G-W%V`
          # on a Monday run would report the NEW week (e.g. W17) while the
          # file on disk is `weekly/2026-W16.md` — the commit message must
          # match the artifact.
          WEEK_ID="$(date -u -d 'yesterday' +%G-W%V)"
          git commit -m "archive: weekly digest $WEEK_ID"
          echo "committed=true" >> "$GITHUB_OUTPUT"
      - name: gitleaks secret scan
        if: ${{ steps.commit.outputs.committed == 'true' }}
        # Pinned to v2 commit SHA (immutable; floating tags can be moved).
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push weekly digest
        if: ${{ steps.commit.outputs.committed == 'true' }}
        run: |
          set -euo pipefail
          git pull --rebase --autostash origin ${GITHUB_REF_NAME}
          if ! git push origin HEAD:${GITHUB_REF_NAME}; then
            echo "::error::Weekly DIVERGENCE — Buttondown publish succeeded but git push failed. The weekly sentinel (weekly/{weekId}.published) is stranded on this runner; a manual re-dispatch of this workflow would re-publish. Operator must investigate before re-dispatch (retry push from local, or pause the workflow)."
            exit 1
          fi
