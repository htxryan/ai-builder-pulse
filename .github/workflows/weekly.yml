name: Weekly Digest

on:
  schedule:
    - cron: "30 14 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODE: weekly
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Weekly digest (placeholder — wired in E6)
        run: echo "weekly digest not yet implemented (E6 owns this)"
