name: Keepalive

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: No-op keepalive (E-03)
        run: |
          echo "keepalive run at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "prevents GitHub Actions 60-day auto-disable"
