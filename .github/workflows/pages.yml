# Deploy the brochure site to GitHub Pages.
#
# The pipeline writes issues/latest.json on every successful daily publish;
# that commit to main triggers this workflow, which assembles `site/` plus
# the `issues/` archive into a single artifact and deploys to Pages. The
# brochure's JS fetches `./latest.json` and `./issues/<date>/items.json`
# same-origin, so there is no CORS surface.
#
# This workflow is deploy-only: it does NOT execute the newsletter pipeline
# (no Claude/Buttondown calls, no `pnpm start`). Assembly is delegated to
# `pnpm build:site` (see scripts/build-site.ts) so the artifact layout
# lives in versioned TypeScript rather than inline bash and can be extended
# (markdown-to-HTML, archive index) without rewriting the workflow.

name: Deploy brochure site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "issues/**"
      - "scripts/build-site.ts"
      - ".github/workflows/pages.yml"
  # GitHub suppresses `push`-trigger chains when the pushing commit was
  # made with the default GITHUB_TOKEN (anti-loop protection). The daily
  # newsletter workflow commits the archive + latest.json with that
  # token, so relying on `push` alone leaves the site stale. This
  # `workflow_run` trigger fires when Daily Newsletter completes
  # successfully, regardless of the commit author — same effect as a
  # PAT-backed push without the credential surface.
  workflow_run:
    workflows: ["Daily Newsletter"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# A daily pipeline commit can race a manual `workflow_dispatch` run. We
# serialize on the `pages` group so a newer deploy always wins, but we do
# NOT cancel an in-progress deploy mid-upload (can leave Pages in a bad
# state). The queued run picks up latest main when it starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site artifact
    runs-on: ubuntu-latest
    # For workflow_run triggers, only rebuild when the upstream daily
    # newsletter run actually succeeded. A failed daily run has no new
    # archive to deploy. Other triggers (push, workflow_dispatch) always
    # proceed — `conclusion` is `null` under those and the fallback holds.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assemble artifact
        # Produces `_site/` from `site/` + `issues/`. See scripts/build-site.ts.
        # A non-zero exit here fails the job, which is the contract AC-3 relies on.
        run: pnpm build:site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
