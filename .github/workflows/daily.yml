name: Daily Newsletter

on:
  schedule:
    - cron: "7 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to 1 to skip publish + commit"
        required: false
        default: "0"

# cancel-in-progress: true is safe here because the remote .published sentinel
# (written atomically by the orchestrator on a successful Buttondown 2xx and
# committed in the same run) is the authoritative de-dup key. If a 06:07 cron
# run is cancelled mid-flight by an operator's workflow_dispatch rerun:
#   • pre-publish cancel  → no email sent; replacement run publishes cleanly.
#   • post-publish cancel before commit → sentinel not committed; replacement
#     run's pre-flight `git ls-tree origin/...` would not see it and would
#     re-publish. This is the known Un-06 DIVERGENCE case the workflow already
#     surfaces with ::error:: on push-failure; operator-triggered cancellation
#     carries the same responsibility (don't cancel after the orchestrator
#     logs "publish ok" unless you're prepared to delete the Buttondown draft).
#   • post-push                → sentinel is on origin; replacement short-circuits.
# The prior `cancel-in-progress: false` allowed a 06:07 cron and a manual
# workflow_dispatch to run concurrently and race on the sentinel commit +
# push. Cancelling the older run eliminates the race.
concurrency:
  group: daily-publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Archivist needs write access; fetch full history so a follow-up
          # push is a plain fast-forward (no rebase needed against remote).
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      # Un-06 remote-idempotency pre-flight. If the remote already has
      # `issues/{today}/.published`, a prior run for this runDate already
      # sent the email. Export SKIP_RUN=1 so `src/index.ts` short-circuits
      # BEFORE any Claude/Buttondown calls. `git ls-tree` against the
      # tracked remote ref is authoritative: unlike a local existsSync on
      # the runner checkout, it can't be fooled by a stale local cache.
      - name: Pre-flight remote sentinel check
        id: preflight
        run: |
          set -euo pipefail
          RUN_DATE="$(date -u +%Y-%m-%d)"
          SENTINEL="issues/${RUN_DATE}/.published"
          # -r recursive; --name-only prints just the path; 2>/dev/null
          # swallows the "not in tree" case (which is the happy path for
          # a new day with no prior send).
          if git ls-tree -r --name-only "origin/${GITHUB_REF_NAME}" -- "$SENTINEL" 2>/dev/null | grep -Fxq "$SENTINEL"; then
            echo "::warning::Un-06 remote-idempotency: ${SENTINEL} already present on origin — short-circuiting"
            echo "SKIP_RUN=1" >> "$GITHUB_ENV"
            echo "SKIP_RUN_REASON=remote sentinel ${SENTINEL} exists on origin/${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "no remote sentinel for ${RUN_DATE} — proceeding"
          fi
      # Publish secrets are scoped to this step only. Defence-in-depth: the
      # checkout, install, lint, test, and commit steps must never see the
      # Claude/Buttondown/Reddit keys, so a compromised dependency invoked
      # during `pnpm install` or `pnpm test` cannot exfiltrate them via
      # process.env. Job-level `env:` would expose them to every step.
      - name: Run orchestrator
        id: orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          CURATOR_MODEL_OVERRIDE: ${{ vars.CURATOR_MODEL_OVERRIDE }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_FALLBACK_PUBLIC: ${{ vars.REDDIT_FALLBACK_PUBLIC }}
          # Used by the GitHub Trending collector's homepage-enrichment
          # lookup (authenticated 5000/hr rate limit). Optional; absent →
          # unauthenticated 60/hr fallback.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm start
      # E6: commit issues/{runDate}/ artifacts locally. If nothing was
      # written (DRY_RUN, skip statuses), the step records that and exits 0.
      # Commit happens BEFORE gitleaks so the scan sees the exact ref that
      # will be pushed.
      - name: Commit daily archive
        id: commit
        if: ${{ env.DRY_RUN != '1' }}
        run: |
          set -euo pipefail
          git config user.name "ai-builder-pulse-bot"
          git config user.email "ai-builder-pulse-bot@users.noreply.github.com"
          git add issues/ || true
          if git diff --cached --quiet; then
            echo "::notice::no archive changes to commit (S-02 skip, S-03 skip, or failed run)"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUN_DATE="$(date -u +%Y-%m-%d)"
          git commit -m "archive: daily issue $RUN_DATE"
          echo "committed=true" >> "$GITHUB_OUTPUT"
      # Un-07 gitleaks scan between commit and push. A positive scan
      # (secret found in committed content) fails the run before anything
      # leaves the runner.
      - name: gitleaks secret scan
        if: ${{ steps.commit.outputs.committed == 'true' }}
        # Pinned to v2 commit SHA (floating tags can be moved to malicious
        # commits; SHA pin is immutable).
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Un-06: if `git push` fails after the Buttondown 2xx, the archive
      # commit (including `.published`) stays only on the ephemeral runner.
      # The next cron run's pre-flight `git ls-tree origin/...` will NOT
      # see the sentinel, so SKIP_RUN stays unset and the orchestrator
      # would re-send. Mitigation: the orchestrator itself runs the E-06
      # backfill on the NEXT run and re-publishes only days it finds
      # orphaned on disk — which, after a failed push, is none. The
      # definitive remote-side guard is THIS step exiting 1 so the
      # workflow is visibly broken; an operator must either restore the
      # push manually or delete the corresponding Buttondown draft before
      # the next cron fires.
      - name: Push daily archive
        if: ${{ steps.commit.outputs.committed == 'true' }}
        run: |
          set -euo pipefail
          # Rebase onto remote to absorb any commits that landed between
          # checkout and now (rare on a single-writer cron branch, but cheap
          # insurance). Autostash preserves the just-made archive commit.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "::error::Un-06 DIVERGENCE — Buttondown publish succeeded but git push failed. The archive commit is stranded on this runner. Next run's remote sentinel pre-flight will NOT see this sentinel and would attempt to re-publish. Operator MUST investigate before the next cron fires: either retry the push, or delete the corresponding Buttondown issue and let the next run re-send cleanly."
            exit 1
          fi
